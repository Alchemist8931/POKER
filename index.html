<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212" />
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <title>Poker Games</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  
  <!-- Three.js Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  
  <style>
    :root {
      --bg-primary: #121212;
      --bg-secondary: #1E1E1E;
      --bg-card: #2C2C2C;
      --bg-elevated: #3A3A3A;
      --text-primary: #FFFFFF;
      --text-secondary: #B0B0B0;
      --text-muted: #757575;
      --border-color: #3A3A3A;
      --border-light: #505050;
      --accent: #FFFFFF;
      --accent-hover: #E0E0E0;
      --accent-text: #000000;
      --accent-glow: rgba(255, 255, 255, 0.1);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --tab-bg: #1E1E1E;
      --tab-active: #3A3A3A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'SN Pro', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

    .bg-pattern {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .noise-overlay {
      position: fixed; inset: 0;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1;
    }

    /* DB CONNECTION OVERLAY STYLES */
    .db-connection-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0s linear 0.5s;
    }

    .db-connection-overlay.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.5s ease, visibility 0s linear 0s;
    }

    .db-connection-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(12, 12, 12, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .db-overlay-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 430px;
      padding: 20px;
    }

    .db-canvas-container {
      width: 100%;
      height: 280px;
      position: relative;
    }

    .db-canvas-container canvas {
      display: block;
    }

    .db-message-container {
      text-align: center;
      padding: 0 20px;
      margin-top: 10px;
    }

    .db-loading-text {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .db-dots {
      display: inline-block;
      width: 24px;
      text-align: left;
    }

    .db-error-message {
      color: var(--text-primary);
      font-size: 13px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 20px;
      border-radius: 14px;
      line-height: 1.6;
      font-weight: 400;
      max-width: 320px;
    }

    /* APP BLUR WHEN DB LOST */
    .app-blur-wrapper {
      transition: filter 0.5s ease, opacity 0.5s ease;
    }

    .app-blur-wrapper.blurred {
      filter: blur(8px);
      opacity: 0.4;
      pointer-events: none;
    }

    /* AUTH SECTION */
    .auth-section {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg-primary);
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.4s ease, visibility 0s linear 0.4s;
    }
    
    .auth-section.visible { opacity: 1; visibility: visible; pointer-events: auto; transition: opacity 0.4s ease, visibility 0s linear 0s; }

    .auth-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; position: relative; padding-bottom: 40px; }

    .auth-brand { margin-bottom: 32px; text-align: center; }
    .brand-icon { width: 64px; height: 64px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); }
    .brand-icon svg { width: 32px; height: 32px; color: var(--accent-text); }
    .brand-title { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .brand-subtitle { font-size: 14px; color: var(--text-muted); }

    .auth-card { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: scale(0.98) translateY(10px); }
    .auth-section.visible .auth-card { transform: scale(1) translateY(0); }
    .auth-card-header { padding: 20px 20px 0; position: relative; }

    .tab-container { position: relative; display: flex; padding: 3px; background-color: var(--tab-bg); border-radius: 14px; border: 1px solid var(--border-color); }
    .tab-container .indicator { width: 50%; height: 40px; background: var(--tab-active); position: absolute; top: 3px; left: 3px; z-index: 9; border-radius: 11px; border: 1px solid var(--border-light); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .tab-container .tab { width: 50%; height: 40px; position: absolute; z-index: 99; outline: none; opacity: 0; cursor: pointer; }
    .tab-container .tab_label { width: 50%; height: 40px; position: relative; z-index: 999; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: color 0.3s ease; }
    .tab-container .tab:checked + .tab_label { color: var(--text-primary); }
    .tab-container .tab--register:checked ~ .indicator { left: 50%; }

    .auth-card-body { padding: 20px; padding-top: 24px; min-height: 180px; position: relative; }
    .forms-wrapper { position: relative; width: 100%; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; width: 100%; transition: opacity 0.35s ease, transform 0.35s ease, visibility 0.35s ease; }

    .login-form { position: relative; opacity: 1; visibility: visible; transform: translateX(0); z-index: 2; }
    .register-form { position: absolute; top: 0; left: 0; right: 0; opacity: 0; visibility: hidden; transform: translateX(30px); z-index: 1; pointer-events: none; }
    .auth-card.is-register .login-form { position: absolute; top: 0; left: 0; right: 0; opacity: 0; visibility: hidden; transform: translateX(-30px); z-index: 1; pointer-events: none; }
    .auth-card.is-register .register-form { position: relative; opacity: 1; visibility: visible; transform: translateX(0); z-index: 2; pointer-events: auto; }

    .input-container { position: relative; width: 100%; }
    .styled_input_bar { width: 100%; padding: 16px 16px; font-size: 15px; font-family: 'SN Pro', sans-serif; border: 1.5px solid var(--border-color); border-radius: 14px; background-color: var(--bg-secondary); color: var(--text-primary); outline: none; transition: all 0.3s ease; }
    .styled_input_bar::placeholder { color: transparent; }
    .styled_input_bar:focus { border-color: var(--accent); background-color: var(--bg-card); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input-label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 15px; font-family: 'SN Pro', sans-serif; color: var(--text-muted); pointer-events: none; transition: all 0.3s ease; background: transparent; padding: 0 6px; }
    .styled_input_bar:focus + .input-label, .styled_input_bar:not(:placeholder-shown) + .input-label { top: 0; left: 12px; font-size: 12px; font-weight: 500; background-color: var(--bg-card); color: var(--accent); }

    .submit-btn { width: 100%; padding: 16px 24px; background: var(--accent); color: var(--accent-text); border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; margin-top: 8px; }
    .submit-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { background: var(--bg-elevated); color: var(--text-muted); cursor: not-allowed; transform: none; }
    .submit-btn .loader { display: none; width: 20px; height: 20px; border: 2px solid rgba(0, 0, 0, 0.2); border-top-color: var(--accent-text); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .submit-btn.loading .btn-text { visibility: hidden; }
    .submit-btn.loading .loader { display: block; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .banner { padding: 0 16px; margin: 0; border-radius: 12px; font-size: 13px; line-height: 1.5; display: flex; align-items: flex-start; gap: 10px; opacity: 0; max-height: 0; overflow: hidden; transition: all 0.3s ease; }
    .banner.visible { opacity: 1; max-height: 120px; padding: 14px 16px; margin-bottom: 8px; }
    .banner.warning { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--warning); }
    .banner.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--error); }
    .banner.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--success); }
    .banner svg { flex-shrink: 0; margin-top: 2px; }

    .version-tag { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 11px; font-weight: 400; color: var(--text-muted); opacity: 0.4; letter-spacing: 0.5px; pointer-events: none; }

    /* APP LAYOUT */
    .app-container { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }
    .app-container.visible { display: flex; }

    .app-header {
      position: fixed; top: 0; left: 0; right: 0; height: auto; min-height: 60px;
      padding-top: env(safe-area-inset-top); background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color); z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding-left: 20px; padding-right: 20px; padding-bottom: 10px;
    }

    .header-left { display: flex; flex-direction: column; gap: 4px; }
    .header-title { font-size: 20px; font-weight: 700; color: var(--text-primary); transition: opacity 0.3s ease; }
    .header-subtitle { font-size: 12px; color: var(--text-muted); font-weight: 400; }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-nickname { font-size: 14px; font-weight: 500; color: var(--accent-text); padding: 8px 14px; background: var(--accent); border-radius: 10px; }

    .logout-btn {
      width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border-color);
      background: var(--bg-card); color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
    }
    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    .app-body {
      flex: 1;
      margin-top: calc(50px + env(safe-area-inset-top) + 10px);
      margin-bottom: calc(100px + env(safe-area-inset-bottom));
      padding: 10px;
      overflow-y: auto; position: relative; z-index: 10;
    }
    
    .app-body.no-menu {
      margin-bottom: 20px;
    }

    .page-container {
      background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px;
      min-height: calc(100% - 20px); padding: 15px;
      opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .page-container.visible { opacity: 1; transform: translateY(0); }

    .page-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: var(--text-muted); text-align: center; }
    .page-placeholder svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
    .page-placeholder span { font-size: 16px; font-weight: 500; }

    .app-menu {
      position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
      background: var(--bg-primary); border-top: 1px solid var(--border-color); z-index: 50;
      display: flex; align-items: center; justify-content: center; padding: 10px;
      padding-bottom: calc(1px + env(safe-area-inset-bottom));
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    
    .app-menu.hidden {
      opacity: 0; pointer-events: none; transform: translateY(100%);
    }

    .radio-inputs { position: relative; display: flex; flex-wrap: wrap; border-radius: 16px; background-color: var(--bg-card); border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); padding: 4px; width: 100%; font-size: 14px; }
    .radio-inputs .radio { flex: 1 1 auto; text-align: center; }
    .radio-inputs .radio input { display: none; }
    .radio-inputs .radio .name { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; border-radius: 12px; border: none; padding: 16px 8px; color: var(--text-muted); transition: all 0.2s ease-in-out; }
    .radio-inputs .radio .name svg { width: 24px; height: 24px; opacity: 0.6; transition: all 0.2s ease; }
    .radio-inputs .radio input:checked + .name { background-color: var(--bg-elevated); color: var(--accent); font-weight: 600; }
    .radio-inputs .radio input:checked + .name svg { opacity: 1; }
    .radio-inputs .radio:hover .name { background-color: var(--bg-elevated); }
    .menu-label { font-size: 11px; font-weight: 500; letter-spacing: 0.3px; }

    .game-list-container { display: flex; flex-direction: column; gap: 15px; }
    
    .game-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .game-row { display: flex; justify-content: space-between; align-items: baseline; width: 100%; }
    
    .game-row-left { display: flex; align-items: baseline; gap: 10px; }
    .game-row-right { text-align: right; }
    
    .game-number { font-weight: 700; font-size: 14px; }
    .game-type { font-weight: 600; font-size: 13px; }
    .game-type.tournament { text-transform: uppercase; }
    
    .game-date { font-size: 12px; color: var(--text-secondary); }
    .game-name { font-size: 15px; font-weight: 500; }
    .game-address { font-size: 12px; color: var(--text-muted); text-align: right; }
    .game-seats { font-size: 12px; color: var(--text-secondary); }
    
    .game-tables { 
      display: flex; flex-direction: column; gap: 4px; 
      border-top: 1px solid var(--border-color); 
      padding-top: 6px; margin-top: 4px; 
    }
    
    .table-row { display: flex; justify-content: flex-end; font-size: 11px; color: var(--text-muted); }
    .table-row span { margin-left: 5px; }

    .game-actions { margin-top: 8px; display: flex; justify-content: center; }
    
    .book-btn {
      padding: 8px 20px;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .book-btn:hover { background: var(--accent-hover); }
    .book-btn:disabled { background: var(--bg-elevated); color: var(--text-muted); cursor: default; }
    .book-btn.participating { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

    @media (max-width: 360px) {
      .auth-card { border-radius: 20px; }
      .brand-title { font-size: 20px; }
      .header-title { font-size: 18px; }
      .header-nickname { font-size: 12px; padding: 6px 10px; }
    }

    @media (min-width: 500px) {
      body { display: flex; justify-content: center; background: #000; }
      .app-container, .auth-section, .db-connection-overlay { max-width: 430px; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); position: relative; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="noise-overlay"></div>

  <!-- DB Connection Lost Overlay -->
  <div class="db-connection-overlay" id="dbConnectionOverlay">
    <div class="db-overlay-content">
      <div class="db-canvas-container" id="dbCanvasContainer"></div>
      <div class="db-message-container">
        <div class="db-loading-text">
          Восстановление соединения<span class="db-dots" id="dbDots"></span>
        </div>
        <div class="db-error-message">
          Потеряно соединение с сервером. Пожалуйста, подождите...
        </div>
      </div>
    </div>
  </div>

  <!-- App Blur Wrapper -->
  <div class="app-blur-wrapper" id="appBlurWrapper">
    <!-- Auth Section -->
    <section class="auth-section visible" id="authSection">
      <div class="auth-container">
        <div class="auth-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 8v4l3 3"/></svg>
          </div>
          <div class="brand-title">Poker Games</div>
          <div class="brand-subtitle">Регистрация на мероприятия</div>
        </div>

        <div class="auth-card" id="authCard">
          <div class="auth-card-header">
            <div class="tab-container">
              <input type="radio" name="authTab" id="tabLogin" class="tab tab--login" checked />
              <label class="tab_label" for="tabLogin">Вход</label>
              <input type="radio" name="authTab" id="tabRegister" class="tab tab--register" />
              <label class="tab_label" for="tabRegister">Регистрация</label>
              <div class="indicator"></div>
            </div>
          </div>
          
          <div class="auth-card-body">
            <div class="forms-wrapper">
              <form class="auth-form login-form" id="loginForm" autocomplete="on">
                <div class="input-container">
                  <input type="text" class="styled_input_bar" id="loginUsername" name="username" placeholder=" " autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" />
                  <label class="input-label" for="loginUsername">Никнейм</label>
                </div>
                <div class="input-container">
                  <input type="password" class="styled_input_bar" id="loginPassword" name="password" placeholder=" " autocomplete="current-password" />
                  <label class="input-label" for="loginPassword">Пароль</label>
                </div>
                <div class="banner warning" id="loginBanner">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                  <span id="loginBannerText">Ошибка входа.</span>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn"><span class="btn-text">Войти</span><div class="loader"></div></button>
              </form>
              
              <form class="auth-form register-form" id="registerForm" autocomplete="on">
                <div class="input-container"><input type="text" class="styled_input_bar" id="regLastName" placeholder=" " /><label class="input-label" for="regLastName">Фамилия</label></div>
                <div class="input-container"><input type="text" class="styled_input_bar" id="regFirstName" placeholder=" " /><label class="input-label" for="regFirstName">Имя</label></div>
                <div class="input-container"><input type="text" class="styled_input_bar" id="regMiddleName" placeholder=" " /><label class="input-label" for="regMiddleName">Отчество</label></div>
                <div class="input-container"><input type="tel" class="styled_input_bar" id="regPhone" placeholder=" " maxlength="18" /><label class="input-label" for="regPhone">Мобильный телефон</label></div>
                <div class="input-container"><input type="email" class="styled_input_bar" id="regEmail" placeholder=" " autocomplete="email" /><label class="input-label" for="regEmail">Почтовый ящик</label></div>
                <div class="input-container"><input type="text" class="styled_input_bar" id="regNickname" name="username" placeholder=" " autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" /><label class="input-label" for="regNickname">Никнейм (логин)</label></div>
                <div class="input-container"><input type="password" class="styled_input_bar" id="regPassword" name="new-password" placeholder=" " autocomplete="new-password" /><label class="input-label" for="regPassword">Пароль</label></div>
                
                <div class="banner success" id="registerBanner">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                  <span>Регистрация завершена. Ожидайте подтверждения.</span>
                </div>

          <label class="radio"><input type="radio" name="appMenu" id="menuMyEvents" /><span class="name"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span></label>
          <label class="radio"><input type="radio" name="appMenu" id="menuSupport" /><span class="name"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></span></label>

  <script>
    // ==========================================
    // VERSION & CONFIG
    // ==========================================
    const APP_VERSION = 'v 1.09';
    (function checkVersion() {
      const storedVersion = localStorage.getItem('poker_app_version');
      if (storedVersion && storedVersion !== APP_VERSION) {
        localStorage.removeItem('poker_saved_nickname');
        localStorage.removeItem('poker_saved_password');
        localStorage.removeItem('poker_auto_login');
        localStorage.setItem('poker_app_version', APP_VERSION);
      } else if (!storedVersion) localStorage.setItem('poker_app_version', APP_VERSION);
    })();

    const SUPABASE_URL = "https://ncdwlmgwljjwpuawlssr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jZHdsbWd3bGpqd3B1YXdsc3NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NTQxNDksImV4cCI6MjA4MzAzMDE0OX0.rrIznUflWydylTnUZvOxOkeF9eMp91qNN4Bjq2gXRL8";
    
    let supabaseClient = null;
    let currentUser = null;

    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
      try { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { console.error(e); }
    }

    function cleanString(str) {
      if (!str) return '';
      return str.toString().normalize('NFKC').replace(/[\u200B-\u200D\uFEFF\u00A0]/g, '').trim();
    }

    // ==========================================
    // DOM ELEMENTS
    // ==========================================
    const authCard = document.getElementById('authCard');
    const authSection = document.getElementById('authSection');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const appContainer = document.getElementById('appContainer');
    const appBody = document.getElementById('appBody');
    const appMenu = document.getElementById('appMenu');
    const pageContainer = document.getElementById('pageContainer');
    const pageTitle = document.getElementById('pageTitle');
    const headerNickname = document.getElementById('headerNickname');

    // ==========================================
    // DB CONNECTION MONITORING
    // ==========================================
    const dbConnectionOverlay = document.getElementById('dbConnectionOverlay');
    const appBlurWrapper = document.getElementById('appBlurWrapper');
    const dbDots = document.getElementById('dbDots');
    
    let isDbConnected = true;
    let dbCheckInterval = null;
    let dotsCount = 0;
    let dotsInterval = null;

    // Dots animation
    function startDotsAnimation() {
      if (dotsInterval) return;
      dotsInterval = setInterval(() => {
        dotsCount = (dotsCount + 1) % 4;
        if (dbDots) dbDots.textContent = '.'.repeat(dotsCount);
      }, 500);
    }

    function stopDotsAnimation() {
      if (dotsInterval) {
        clearInterval(dotsInterval);
        dotsInterval = null;
      }
      if (dbDots) dbDots.textContent = '';
    }

    // Show connection lost overlay
    function showConnectionLost() {
      if (!isDbConnected) return;
      isDbConnected = false;
      
      appBlurWrapper.classList.add('blurred');
      dbConnectionOverlay.classList.add('visible');
      startDotsAnimation();
    }

    // Hide connection lost overlay
    function hideConnectionLost() {
      if (isDbConnected) return;
      isDbConnected = true;
      
      appBlurWrapper.classList.remove('blurred');
      dbConnectionOverlay.classList.remove('visible');
      stopDotsAnimation();
    }

    // Ping database
    async function pingDatabase() {
      if (!supabaseClient) {
        // If supabase not initialized, don't show overlay
        return;
      }

      try {
        // Simple ping query - just check if we can connect
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const { error } = await supabaseClient
          .from('poker_users')
          .select('id')
          .limit(1)
          .abortSignal(controller.signal);

        clearTimeout(timeoutId);

        if (error && error.code !== 'PGRST116') {
          // Real error (not just "no rows")
          showConnectionLost();
        } else {
          hideConnectionLost();
        }
      } catch (err) {
        // Network error or timeout
        if (err.name === 'AbortError' || err.message === 'Failed to fetch') {
          showConnectionLost();
        }
      }
    }

    // Start DB monitoring
    function startDbMonitoring() {
      if (dbCheckInterval) clearInterval(dbCheckInterval);
      
      // Initial check
      pingDatabase();
      
      // Check every 2 seconds
      dbCheckInterval = setInterval(pingDatabase, 2000);
    }

    // Stop DB monitoring (if needed)
    function stopDbMonitoring() {
      if (dbCheckInterval) {
        clearInterval(dbCheckInterval);
        dbCheckInterval = null;
      }
    }

    // ==========================================
    // AUTH LOGIC
    // ==========================================
    tabLogin.addEventListener('change', () => { if (tabLogin.checked) { authCard.classList.remove('is-register'); hideLoginBanner(); } });
    tabRegister.addEventListener('change', () => { if (tabRegister.checked) { authCard.classList.add('is-register'); hideRegisterBanner(); } });
    
    document.getElementById('regPhone').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 0) {
        if (value[0] === '8' || value[0] === '7') value = value.substring(1);
        let formatted = '+7';
        if (value.length > 0) formatted += ' (' + value.substring(0, 3);
        if (value.length > 3) formatted += ') ' + value.substring(3, 6);
        if (value.length > 6) formatted += '-' + value.substring(6, 8);
        if (value.length > 8) formatted += '-' + value.substring(8, 10);
        e.target.value = formatted;
      }
    });

    function showLoginBanner(message, type = 'warning') { const banner = document.getElementById('loginBanner'); const text = document.getElementById('loginBannerText'); text.textContent = message; banner.className = 'banner visible ' + type; }
    function hideLoginBanner() { document.getElementById('loginBanner').classList.remove('visible'); }
    function showRegisterBanner(message, type = 'success') { const banner = document.getElementById('registerBanner'); const text = banner.querySelector('span'); text.textContent = message; banner.className = 'banner visible ' + type; }
    function hideRegisterBanner() { document.getElementById('registerBanner').classList.remove('visible'); }

    async function handleLogin(e) {
      e.preventDefault();
      const nickname = cleanString(document.getElementById('loginUsername').value);
      const password = cleanString(document.getElementById('loginPassword').value);
      const loginBtn = document.getElementById('loginBtn');
      
      if (!nickname || !password) { showLoginBanner('Заполните все поля', 'warning'); return; }
      
      loginBtn.classList.add('loading'); loginBtn.disabled = true; hideLoginBanner();
      
      try {
        if (!supabaseClient) throw new Error("Supabase not initialized");
        
        const { data, error } = await supabaseClient.from('poker_users').select('*').eq('nickname', nickname).limit(1);
        if (error) throw error;
        if (!data || data.length === 0) { showLoginBanner('Пользователь не найден', 'warning'); loginBtn.classList.remove('loading'); loginBtn.disabled = false; return; }
        
        const user = data[0];
        if (user.password !== password) { showLoginBanner('Неверный пароль', 'warning'); loginBtn.classList.remove('loading'); loginBtn.disabled = false; return; }
        if (user.status === 'created') { showLoginBanner('Свяжитесь с организатором для подтверждения учетной записи', 'warning'); loginBtn.classList.remove('loading'); loginBtn.disabled = false; return; }
        if (user.status === 'blocked') { showLoginBanner('Ваша учетная запись заблокирована', 'error'); loginBtn.classList.remove('loading'); loginBtn.disabled = false; return; }
        
        if (user.status === 'confirmed') {
          currentUser = user;
          await supabaseClient.from('poker_users').update({ last_login: new Date().toISOString() }).eq('id', user.id);
          localStorage.setItem('poker_saved_nickname', nickname);
          localStorage.setItem('poker_saved_password', password);
          localStorage.setItem('poker_auto_login', 'true');
          loginBtn.classList.remove('loading'); loginBtn.disabled = false;
          showApp();
        }
      } catch (err) {
        console.error(err); showLoginBanner('Ошибка: ' + err.message, 'error');
        loginBtn.classList.remove('loading'); loginBtn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const fields = ['regLastName', 'regFirstName', 'regMiddleName', 'regPhone', 'regEmail', 'regNickname', 'regPassword'];
      const values = fields.map(id => cleanString(document.getElementById(id).value));
      if (values.some(v => !v)) { showRegisterBanner('Заполните все поля', 'warning'); return; }
      
      const registerBtn = document.getElementById('registerBtn');
      registerBtn.classList.add('loading'); registerBtn.disabled = true; hideRegisterBanner();
      
      try {
        const { error } = await supabaseClient.from('poker_users').insert([{ last_name: values[0], first_name: values[1], middle_name: values[2], phone: values[3], email: values[4], nickname: values[5], password: values[6], status: 'created', created_at: new Date().toISOString() }]).select();
        if (error) { showRegisterBanner(error.code === '23505' ? 'Никнейм занят' : 'Ошибка: ' + error.message, 'error'); registerBtn.classList.remove('loading'); registerBtn.disabled = false; return; }
        
        showRegisterBanner('Регистрация завершена. Ожидайте подтверждения.', 'success');
        registerBtn.classList.remove('loading'); registerBtn.disabled = false;
        setTimeout(() => { registerForm.reset(); hideRegisterBanner(); tabLogin.checked = true; authCard.classList.remove('is-register'); document.getElementById('loginUsername').value = values[5]; }, 3000);
      } catch (err) { showRegisterBanner('Ошибка: ' + err.message, 'error'); registerBtn.classList.remove('loading'); registerBtn.disabled = false; }
    }

    // ==========================================
    // APP STATE & NAVIGATION
    // ==========================================
    function showApp() {
      authSection.classList.remove('visible');
      setTimeout(() => {
        appContainer.classList.add('visible');
        updateUserUI();
        
        // Role Logic
        if (currentUser && currentUser.user_type === 'employee') {
          appMenu.classList.add('hidden');
          appBody.classList.add('no-menu');
          renderEmployeePage();
        } else {
          appMenu.classList.remove('hidden');
          appBody.classList.remove('no-menu');
          navigateToPage('events');
        }
      }, 400);
    }

    function hideApp() {
      localStorage.removeItem('poker_saved_nickname');
      localStorage.removeItem('poker_saved_password');
      localStorage.removeItem('poker_auto_login');
      currentUser = null;
      appContainer.classList.remove('visible');
      setTimeout(() => {
        authSection.classList.add('visible');
        loginForm.reset(); registerForm.reset(); hideLoginBanner(); hideRegisterBanner();
        tabLogin.checked = true; authCard.classList.remove('is-register');
      }, 400);
    }

    function updateUserUI() { if (currentUser) headerNickname.textContent = currentUser.nickname || 'player'; }

    const menuEvents = document.getElementById('menuEvents');
    const menuMyEvents = document.getElementById('menuMyEvents');
    const menuSupport = document.getElementById('menuSupport');
    const pageNames = { 'events': 'Мероприятия', 'myevents': 'Мои участия', 'support': 'Тех поддержка' };

    function navigateToPage(page) {
      pageContainer.classList.remove('visible');
      setTimeout(() => {
        pageTitle.textContent = pageNames[page] || 'Страница';
        
        if (page === 'events') renderEventsPage();
        else if (page === 'myevents') renderPlaceholder(2);
        else if (page === 'support') renderPlaceholder(3);
        
        setTimeout(() => pageContainer.classList.add('visible'), 50);
      }, 300);
    }

    function renderPlaceholder(num) {
      pageContainer.innerHTML = `<div class="page-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span>Страница ${num}</span></div>`;
    }

    function renderEmployeePage() {
      pageContainer.classList.remove('visible');
      setTimeout(() => {
        pageTitle.textContent = "Панель сотрудника";
        pageContainer.innerHTML = `<div class="page-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Функционал сотрудника в разработке</span></div>`;
        setTimeout(() => pageContainer.classList.add('visible'), 50);
      }, 300);
    }

    // ==========================================
    // EVENTS PAGE RENDERING
    // ==========================================
    async function renderEventsPage() {
      pageContainer.innerHTML = `<div class="page-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation: spin 2s linear infinite;"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg><span>Загрузка...</span></div>`;
      
      try {
        // 1. Fetch Games
        const { data: games, error: gamesError } = await supabaseClient
          .from('poker_game_list')
          .select('*')
          .order('game_date', { ascending: true });
        
        if (gamesError) throw gamesError;
        
        // 2. Fetch Tables
        const { data: tables, error: tablesError } = await supabaseClient
          .from('poker_game_list_table')
          .select('*');
        
        if (tablesError) throw tablesError;

        // 3. Check Participation
        const { data: participations } = await supabaseClient
          .from('poker_game_list_table_participant')
          .select('game_id')
          .eq('user_nickname', currentUser.nickname);

        const participatedGameIds = new Set(participations ? participations.map(p => p.game_id) : []);

        // 4. Render
        let html = '<div class="game-list-container">';
        
        if (games.length === 0) {
          html += '<div class="page-placeholder"><span>Нет доступных мероприятий</span></div>';
        } else {
          games.forEach(game => {
            const gameTables = tables.filter(t => t.game_id === game.id);
            const isParticipating = participatedGameIds.has(game.id);
            
            // Format date
            const dateObj = new Date(game.game_date);
            const timeStr = dateObj.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            const dateStr = dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            const formattedDate = `( ${timeStr} ) ${dateStr}`;

            // Format type
            const typeClass = game.game_type === 'Tournament' ? 'tournament' : '';
            const typeText = game.game_type === 'Tournament' ? 'TOURNAMENT' : 'Loose Game';

            html += `
              <div class="game-card">
                <div class="game-row">
                  <div class="game-row-left">
                    <span class="game-number">${game.game_number || ''}</span>
                    <span class="game-type ${typeClass}">${typeText}</span>
                  </div>
                  <div class="game-row-right">
                    <span class="game-date">${formattedDate}</span>
                  </div>
                </div>
                <div class="game-row">
                  <div class="game-row-left">
                    <span class="game-name">${game.game_name}</span>
                  </div>
                </div>
                <div class="game-row">
                  <div class="game-row-right">
                    <span class="game-address">${game.address}</span>
                  </div>
                </div>
                <div class="game-row">
                  <div class="game-row-left">
                    <span class="game-seats">Всего мест: ${game.total_seats || 0} / Занято: ${game.occupied_seats || 0}</span>
                  </div>
                </div>
            `;

            if (gameTables.length > 0) {
              html += '<div class="game-tables">';
              gameTables.forEach(table => {
                html += `
                  <div class="table-row">
                    Стол №${table.table_number} / упр. ${table.admin_name || '-'} / Контакт ${table.admin_phone || '-'}
                  </div>
                `;
              });
              html += '</div>';
            }

            html += `
              <div class="game-actions">
                <button class="book-btn ${isParticipating ? 'participating' : ''}" 
                        onclick="handleBookSeat('${game.id}', this)" 
                        ${isParticipating ? 'disabled' : ''}>
                  ${isParticipating ? 'Я участвую' : 'Занять место'}
                </button>
              </div>
            </div>`;
          });
        }
        
        html += '</div>';
        pageContainer.innerHTML = html;

      } catch (err) {
        console.error(err);
        pageContainer.innerHTML = `<div class="page-placeholder"><span>Ошибка загрузки данных</span></div>`;
      }
    }

    async function handleBookSeat(gameId, btn) {
      if (!currentUser) return;
      
      btn.disabled = true;
      btn.textContent = 'Запись...';

      try {
        // Find first table for this game (simplified logic as per UI design)
        const { data: tables, error: tError } = await supabaseClient
          .from('poker_game_list_table')
          .select('id, game_number, address, table_number, admin_name, admin_phone')
          .eq('game_id', gameId)
          .limit(1);

        if (tError || !tables || tables.length === 0) {
          alert('Нет доступных столов для записи');
          btn.disabled = false;
          btn.textContent = 'Занять место';
          return;
        }

        const table = tables[0];

        // Get Game Info for denormalization
        const { data: gameInfo } = await supabaseClient
          .from('poker_game_list')
          .select('game_number, address')
          .eq('id', gameId)
          .single();

        // Insert Participant
        const { error: insertError } = await supabaseClient
          .from('poker_game_list_table_participant')
          .insert([{
            game_id: gameId,
            game_number: gameInfo?.game_number,
            address: gameInfo?.address || table.address,
            table_id: table.id,
            table_number: table.table_number,
            admin_name: table.admin_name,
            admin_phone: table.admin_phone,
            user_nickname: currentUser.nickname,
            status: 'в игре', // Setting status to 'in game' to occupy seat immediately
            last_name: currentUser.last_name,
            first_name: currentUser.first_name,
            middle_name: currentUser.middle_name,
            phone: currentUser.phone,
            email: currentUser.email
          }]);

        if (insertError) {
          if (insertError.code === '23505') {
            alert('Вы уже записаны на это мероприятие');
            btn.textContent = 'Я участвую';
            btn.classList.add('participating');
          } else {
            throw insertError;
          }
        } else {
          btn.textContent = 'Я участвую';
          btn.classList.add('participating');
          // Optional: Force refresh stats if trigger is slow/missing logic
          // For now we assume DB trigger handles occupied_seats
        }

      } catch (err) {
        console.error(err);
        alert('Ошибка записи: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Занять место';
      }
    }

    // Event Listeners
    menuEvents.addEventListener('change', () => { if (menuEvents.checked) navigateToPage('events'); });
    menuMyEvents.addEventListener('change', () => { if (menuMyEvents.checked) navigateToPage('myevents'); });
    menuSupport.addEventListener('change', () => { if (menuSupport.checked) navigateToPage('support'); });

    async function checkAutoLogin() {
      const savedNickname = localStorage.getItem('poker_saved_nickname');
      const savedPassword = localStorage.getItem('poker_saved_password');
      const autoLogin = localStorage.getItem('poker_auto_login');
      
      if (autoLogin === 'true' && savedNickname && savedPassword && supabaseClient) {
        document.getElementById('loginUsername').value = savedNickname;
        document.getElementById('loginPassword').value = savedPassword;
        try {
          const { data } = await supabaseClient.from('poker_users').select('*').eq('nickname', savedNickname).limit(1);
          if (data && data.length > 0) {
            const user = data[0];
            if (user.password === savedPassword && user.status === 'confirmed') {
              currentUser = user;
              await supabaseClient.from('poker_users').update({ last_login: new Date().toISOString() }).eq('id', user.id);
              showApp();
            }
          }
        } catch (err) { console.error("Auto-login error:", err); }
      }
    }

    loginForm.addEventListener('submit', handleLogin);
    registerForm.addEventListener('submit', handleRegister);
    document.getElementById('logoutBtn').addEventListener('click', hideApp);
    
    // Start DB monitoring on load
    document.addEventListener('DOMContentLoaded', () => {
      checkAutoLogin();
      startDbMonitoring();
    });
  </script>

  <!-- Three.js Card Animation Module -->
  <script type="module">
    import * as THREE from 'three';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

    // Three.js Setup
    const container = document.getElementById('dbCanvasContainer');
    if (!container) {
      console.error('Canvas container not found');
    }

    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
    camera.position.z = 4;

    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true 
    });
    renderer.setSize(container.offsetWidth, container.offsetHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.insertBefore(renderer.domElement, container.firstChild);

    // Освещение
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(5, 5, 5);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
    fillLight.position.set(-3, 2, 2);
    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0xffffff, 0.8);
    rimLight.position.set(0, -2, 3);
    scene.add(rimLight);

    // Данные карт
    const cards = [
      { rank: 'A', suit: 'spades', isRed: false },
      { rank: '2', suit: 'hearts', isRed: true },
      { rank: 'J', suit: 'diamonds', isRed: true }
    ];

    let currentCardIndex = 0;

    // Генерация envMap
    function createEnvMap() {
      const size = 128;
      const data = new Uint8Array(size * size * 4);
      
      for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
          const idx = (i * size + j) * 4;
          const gradient = 0.15 + 0.2 * (1 - i / size);
          const noise = Math.random() * 0.03;
          data[idx] = Math.min(255, (gradient + noise) * 255);
          data[idx + 1] = Math.min(255, (gradient + noise) * 255);
          data[idx + 2] = Math.min(255, (gradient + noise) * 255);
          data[idx + 3] = 255;
        }
      }
      
      const texture = new THREE.DataTexture(data, size, size);
      texture.needsUpdate = true;
      return texture;
    }

    const envMap = createEnvMap();

    // Создание текстуры карты
    function createCardTexture(card, isBack = false) {
      const canvas = document.createElement('canvas');
      const scale = 6;
      canvas.width = 70 * scale;
      canvas.height = 100 * scale;
      const ctx = canvas.getContext('2d');

      ctx.scale(scale, scale);

      const suitSymbols = {
        spades: '♠',
        hearts: '♥',
        diamonds: '♦',
        clubs: '♣'
      };

      if (isBack) {
        // Тёмная рубашка
        const gradient = ctx.createLinearGradient(0, 0, 70, 100);
        gradient.addColorStop(0, '#1a1a1a');
        gradient.addColorStop(0.3, '#222222');
        gradient.addColorStop(0.5, '#1e1e1e');
        gradient.addColorStop(0.7, '#252525');
        gradient.addColorStop(1, '#1a1a1a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 70, 100);

        // Brushed metal effect (dark)
        ctx.globalAlpha = 0.03;
        for (let i = 0; i < 300; i++) {
          ctx.strokeStyle = i % 2 === 0 ? '#ffffff' : '#000000';
          ctx.lineWidth = 0.3;
          ctx.beginPath();
          ctx.moveTo(0, i * 0.4);
          ctx.lineTo(70, i * 0.4 + (Math.random() - 0.5) * 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Геометрический паттерн
        ctx.strokeStyle = 'rgba(80, 80, 80, 0.4)';
        ctx.lineWidth = 0.5;
        
        const centerX = 35;
        const centerY = 50;
        
        for (let i = 0; i < 4; i++) {
          const size = 8 + i * 6;
          ctx.beginPath();
          ctx.moveTo(centerX, centerY - size);
          ctx.lineTo(centerX + size * 0.7, centerY);
          ctx.lineTo(centerX, centerY + size);
          ctx.lineTo(centerX - size * 0.7, centerY);
          ctx.closePath();
          ctx.stroke();
        }

        // Угловые элементы
        ctx.strokeStyle = 'rgba(100, 100, 100, 0.3)';
        ctx.lineWidth = 0.8;
        
        ctx.beginPath();
        ctx.moveTo(8, 18);
        ctx.lineTo(8, 8);
        ctx.lineTo(18, 8);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(62, 8);
        ctx.lineTo(62, 18);
        ctx.lineTo(52, 8);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(8, 82);
        ctx.lineTo(8, 92);
        ctx.lineTo(18, 92);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(62, 92);
        ctx.lineTo(62, 82);
        ctx.lineTo(52, 92);
        ctx.stroke();

        // Тонкая рамка
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(4, 4, 62, 92);

      } else {
        // Лицевая сторона - тёмная платина
        const baseGradient = ctx.createLinearGradient(0, 0, 70, 100);
        baseGradient.addColorStop(0, '#252525');
        baseGradient.addColorStop(0.25, '#2a2a2a');
        baseGradient.addColorStop(0.5, '#1f1f1f');
        baseGradient.addColorStop(0.75, '#2d2d2d');
        baseGradient.addColorStop(1, '#222222');
        ctx.fillStyle = baseGradient;
        ctx.fillRect(0, 0, 70, 100);

        // Subtle brushed texture
        ctx.globalAlpha = 0.02;
        for (let i = 0; i < 200; i++) {
          ctx.strokeStyle = Math.random() > 0.5 ? '#fff' : '#000';
          ctx.lineWidth = 0.2;
          ctx.beginPath();
          ctx.moveTo(0, i * 0.5);
          ctx.lineTo(70, i * 0.5 + (Math.random() - 0.5));
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Внутренняя рамка
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(4.5, 4.5, 61, 91);
        
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(3.5, 3.5, 63, 93);

        // Цвет масти
        const suitColor = card.isRed ? '#dc2626' : '#e5e5e5';
        
        // Верхний левый угол
        ctx.fillStyle = suitColor;
        ctx.font = '600 14px SN Pro, -apple-system, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
        ctx.shadowBlur = 2;
        ctx.shadowOffsetX = 0.5;
        ctx.shadowOffsetY = 0.5;
        ctx.fillText(card.rank, 8, 8);
        
        ctx.font = '12px Georgia, serif';
        ctx.fillText(suitSymbols[card.suit], 8, 22);
        ctx.shadowColor = 'transparent';

        // Центральный элемент
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        if (card.rank === 'A') {
          ctx.font = '32px Georgia, serif';
          ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
          ctx.shadowBlur = 2;
          ctx.fillText(suitSymbols[card.suit], 35, 50);
        } else if (card.rank === '2') {
          ctx.font = '20px Georgia, serif';
          ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
          ctx.shadowBlur = 2;
          ctx.fillText(suitSymbols[card.suit], 35, 25);
          ctx.fillText(suitSymbols[card.suit], 35, 75);
        } else if (card.rank === 'J') {
          ctx.font = '600 24px SN Pro, -apple-system, sans-serif';
          ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
          ctx.shadowBlur = 2;
          ctx.fillText('J', 35, 42);
          ctx.font = '14px Georgia, serif';
          ctx.fillText(suitSymbols[card.suit], 35, 62);
        }
        ctx.shadowColor = 'transparent';

        // Нижний правый угол
        ctx.save();
        ctx.translate(70, 100);
        ctx.rotate(Math.PI);
        ctx.font = '600 14px SN Pro, -apple-system, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
        ctx.shadowBlur = 2;
        ctx.fillText(card.rank, 8, 8);
        ctx.font = '12px Georgia, serif';
        ctx.fillText(suitSymbols[card.suit], 8, 22);
        ctx.restore();

        // Блик сверху
        const shineGradient = ctx.createLinearGradient(0, 0, 0, 25);
        shineGradient.addColorStop(0, 'rgba(255, 255, 255, 0.04)');
        shineGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = shineGradient;
        ctx.fillRect(0, 0, 70, 25);
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      return texture;
    }

    // Создание материала карты
    function createCardMaterial(card) {
      const frontTexture = createCardTexture(card, false);
      const backTexture = createCardTexture(card, true);

      const frontMaterial = new THREE.MeshStandardMaterial({
        map: frontTexture,
        metalness: 0.4,
        roughness: 0.5,
        envMap: envMap,
        envMapIntensity: 0.4
      });

      const backMaterial = new THREE.MeshStandardMaterial({
        map: backTexture,
        metalness: 0.4,
        roughness: 0.5,
        envMap: envMap,
        envMapIntensity: 0.4
      });

      const sideMaterial = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a,
        metalness: 0.7,
        roughness: 0.3,
        envMap: envMap,
        envMapIntensity: 0.6
      });

      return [
        sideMaterial,
        sideMaterial,
        sideMaterial,
        sideMaterial,
        frontMaterial,
        backMaterial
      ];
    }

    // Геометрия
    const cardWidth = 0.35;
    const cardHeight = 0.5;
    const cardDepth = 0.008;
    const borderRadius = 0.025;

    const cardGeometry = new RoundedBoxGeometry(
      cardWidth, 
      cardHeight, 
      cardDepth, 
      6,
      borderRadius
    );

    let cardMaterials = createCardMaterial(cards[0]);
    const card = new THREE.Mesh(cardGeometry, cardMaterials);
    scene.add(card);

    // Переменные для анимации
    const rotationSpeed = 0.018;
    let canSwitch = true;

    // Главная анимация
    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now() * 0.001;

      card.rotation.y += rotationSpeed;

      const normalizedRotation = ((card.rotation.y % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      
      const isBackFacing = normalizedRotation > Math.PI * 0.4 && normalizedRotation < Math.PI * 1.6;

      if (isBackFacing && canSwitch) {
        const midPoint = Math.abs(normalizedRotation - Math.PI) < 0.1;
        if (midPoint) {
          currentCardIndex = (currentCardIndex + 1) % cards.length;
          card.material = createCardMaterial(cards[currentCardIndex]);
          canSwitch = false;
        }
      }

      if (!isBackFacing) {
        canSwitch = true;
      }

      // Плавное покачивание
      card.position.y = Math.sin(time * 0.8) * 0.01;
      card.rotation.x = Math.sin(time * 0.5) * 0.008;
      card.rotation.z = Math.sin(time * 0.6) * 0.004;

      // Движение света
      keyLight.position.x = 5 + Math.sin(time * 0.4) * 2;
      rimLight.position.x = Math.cos(time * 0.3) * 2;

      renderer.render(scene, camera);
    }

    animate();

    // Обработка изменения размера окна
    function handleResize() {
      const width = Math.min(container.offsetWidth, 430);
      const height = container.offsetHeight;
      
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    }

    window.addEventListener('resize', handleResize);
    
    // Initial resize after a short delay to ensure container is rendered
    setTimeout(handleResize, 100);
  </script>
</body>
</html>
