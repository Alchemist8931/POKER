<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Фон статус-бара для Android/Chrome -->
  <meta name="theme-color" content="#121212" />
  
  <!-- Запрет кэширования -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <title>Poker Games</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #121212;
      --bg-secondary: #1E1E1E;
      --bg-card: #2C2C2C;
      --bg-elevated: #3A3A3A;
      --text-primary: #FFFFFF;
      --text-secondary: #B0B0B0;
      --text-muted: #757575;
      --border-color: #3A3A3A;
      --border-light: #505050;
      --accent: #FFFFFF;
      --accent-hover: #E0E0E0;
      --accent-text: #000000;
      --accent-glow: rgba(255, 255, 255, 0.1);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --tab-bg: #1E1E1E;
      --tab-active: #3A3A3A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'SN Pro', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

    /* Убираем цветные градиенты, оставляем тонкие белые */
    .bg-pattern {
      position: fixed; inset: 0;
      background: 
        radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .noise-overlay {
      position: fixed; inset: 0;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1;
    }

    /* ==========================================
       AUTH SECTION
    ========================================== */
    .auth-section {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* Учитываем вырезы камеры/брови */
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg-primary);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.4s ease, visibility 0s linear 0.4s;
    }
    
    .auth-section.visible { 
      opacity: 1; 
      visibility: visible; 
      pointer-events: auto;
      transition: opacity 0.4s ease, visibility 0s linear 0s;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding-bottom: 40px;
    }

    .auth-brand {
      margin-bottom: 32px;
      text-align: center;
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .brand-icon svg {
      width: 32px;
      height: 32px;
      color: var(--accent-text); /* Черная иконка на белом фоне */
    }

    .brand-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .brand-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(0.98) translateY(10px);
    }
    
    .auth-section.visible .auth-card { 
      transform: scale(1) translateY(0); 
    }

    .auth-card-header { 
      padding: 20px 20px 0; 
      position: relative; 
    }

    .tab-container { 
      position: relative; 
      display: flex; 
      flex-direction: row; 
      align-items: flex-start; 
      padding: 3px; 
      background-color: var(--tab-bg); 
      border-radius: 14px; 
      border: 1px solid var(--border-color);
    }
    
    .tab-container .indicator { 
      width: 50%; 
      height: 40px; 
      background: var(--tab-active); 
      position: absolute; 
      top: 3px; 
      left: 3px; 
      z-index: 9; 
      border-radius: 11px; 
      border: 1px solid var(--border-light);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    
    .tab-container .tab { 
      width: 50%; 
      height: 40px; 
      position: absolute; 
      z-index: 99; 
      outline: none; 
      opacity: 0; 
      cursor: pointer; 
    }
    
    .tab-container .tab_label { 
      width: 50%; 
      height: 40px; 
      position: relative; 
      z-index: 999; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--text-muted); 
      cursor: pointer; 
      transition: color 0.3s ease; 
    }
    
    .tab-container .tab:checked + .tab_label { color: var(--text-primary); }
    .tab-container .tab--register:checked ~ .indicator { left: 50%; }

    .auth-card-body { 
      padding: 20px; 
      padding-top: 24px; 
      min-height: 180px;
      position: relative;
    }

    .forms-wrapper { 
      position: relative; 
      width: 100%; 
    }
    
    .auth-form { 
      display: flex; 
      flex-direction: column; 
      gap: 14px; 
      width: 100%; 
      transition: opacity 0.35s ease, transform 0.35s ease, visibility 0.35s ease; 
    }

    .login-form { 
      position: relative; 
      opacity: 1; 
      visibility: visible; 
      transform: translateX(0); 
      z-index: 2; 
    }
    
    .register-form { 
      position: absolute; 
      top: 0; 
      left: 0; 
      right: 0;
      opacity: 0; 
      visibility: hidden; 
      transform: translateX(30px); 
      z-index: 1; 
      pointer-events: none; 
    }

    .auth-card.is-register .login-form { 
      position: absolute; 
      top: 0; 
      left: 0; 
      right: 0;
      opacity: 0; 
      visibility: hidden; 
      transform: translateX(-30px); 
      z-index: 1; 
      pointer-events: none; 
    }
    
    .auth-card.is-register .register-form { 
      position: relative; 
      opacity: 1; 
      visibility: visible; 
      transform: translateX(0); 
      z-index: 2; 
      pointer-events: auto; 
    }

    .input-container { 
      position: relative; 
      width: 100%; 
    }
    
    .styled_input_bar { 
      width: 100%; 
      padding: 16px 16px; 
      font-size: 15px; 
      font-family: 'SN Pro', sans-serif; 
      border: 1.5px solid var(--border-color); 
      border-radius: 14px; 
      background-color: var(--bg-secondary); 
      color: var(--text-primary); 
      outline: none; 
      transition: all 0.3s ease; 
    }
    
    .styled_input_bar::placeholder { color: transparent; }
    
    .styled_input_bar:focus { 
      border-color: var(--accent); 
      background-color: var(--bg-card); 
      box-shadow: 0 0 0 3px var(--accent-glow); 
    }
    
    .input-label { 
      position: absolute; 
      left: 16px; 
      top: 50%; 
      transform: translateY(-50%); 
      font-size: 15px; 
      font-family: 'SN Pro', sans-serif; 
      color: var(--text-muted); 
      pointer-events: none; 
      transition: all 0.3s ease; 
      background: transparent; 
      padding: 0 6px; 
    }
    
    .styled_input_bar:focus + .input-label, 
    .styled_input_bar:not(:placeholder-shown) + .input-label { 
      top: 0; 
      left: 12px; 
      font-size: 12px; 
      font-weight: 500; 
      background-color: var(--bg-card); 
      color: var(--accent); 
    }

    .submit-btn { 
      width: 100%; 
      padding: 16px 24px; 
      background: var(--accent); 
      color: var(--accent-text); 
      border: none; 
      border-radius: 14px; 
      font-size: 15px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      position: relative; 
      overflow: hidden; 
      margin-top: 8px; 
    }
    
    .submit-btn:hover { 
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    
    .submit-btn:active { transform: translateY(0); }
    
    .submit-btn:disabled { 
      background: var(--bg-elevated); 
      color: var(--text-muted);
      cursor: not-allowed; 
      transform: none; 
    }
    
    .submit-btn .loader { 
      display: none; 
      width: 20px; 
      height: 20px; 
      border: 2px solid rgba(0, 0, 0, 0.2); 
      border-top-color: var(--accent-text); 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
    }
    
    .submit-btn.loading .btn-text { visibility: hidden; }
    .submit-btn.loading .loader { display: block; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
    
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .banner { 
      padding: 0 16px; 
      margin: 0; 
      border-radius: 12px; 
      font-size: 13px; 
      line-height: 1.5; 
      display: flex; 
      align-items: flex-start; 
      gap: 10px; 
      opacity: 0; 
      max-height: 0; 
      overflow: hidden; 
      transition: all 0.3s ease; 
    }
    
    .banner.visible { 
      opacity: 1; 
      max-height: 120px; 
      padding: 14px 16px; 
      margin-bottom: 8px; 
    }
    
    .banner.warning { 
      background: rgba(245, 158, 11, 0.1); 
      border: 1px solid rgba(245, 158, 11, 0.3); 
      color: var(--warning); 
    }
    
    .banner.error { 
      background: rgba(239, 68, 68, 0.1); 
      border: 1px solid rgba(239, 68, 68, 0.3); 
      color: var(--error); 
    }
    
    .banner.success { 
      background: rgba(16, 185, 129, 0.1); 
      border: 1px solid rgba(16, 185, 129, 0.3); 
      color: var(--success); 
    }
    
    .banner svg { flex-shrink: 0; margin-top: 2px; }

    .version-tag {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      opacity: 0.4;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    /* ==========================================
       APP LAYOUT
    ========================================== */
    .app-container { 
      display: none; 
      min-height: 100vh;
      min-height: 100dvh;
      flex-direction: column;
    }
    
    .app-container.visible { display: flex; }

    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      /* Высота авто с учетом безопасной зоны */
      height: auto;
      min-height: 60px;
      padding-top: env(safe-area-inset-top); /* Растягиваемся под статусбар */
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 10px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      transition: opacity 0.3s ease;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-nickname {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent-text);
      padding: 8px 14px;
      background: var(--accent);
      border-radius: 10px;
    }

    .logout-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .logout-btn:hover {
      border-color: var(--error);
      color: var(--error);
    }

    .app-body {
      flex: 1;
      margin-top: calc(50px + env(safe-area-inset-top) + 10px); /* Отступ с учетом высоты шапки */
      margin-bottom: calc(100px + env(safe-area-inset-bottom)); /* Отступ с учетом высоты меню */
      padding: 10px;
      overflow-y: auto;
      position: relative;
      z-index: 10;
    }

    .page-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      min-height: calc(100% - 40px);
      padding: 24px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .page-container.visible { 
      opacity: 1; 
      transform: translateY(0); 
    }

    .page-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--text-muted);
      text-align: center;
    }
    
    .page-placeholder svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .page-placeholder span {
      font-size: 16px;
      font-weight: 500;
    }

    .app-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      padding-bottom: calc(15px + env(safe-area-inset-bottom)); /* Учет безопасной зоны снизу */
    }

    .radio-inputs {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      border-radius: 16px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      box-sizing: border-box;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      padding: 4px;
      width: 100%;
      font-size: 14px;
    }

    .radio-inputs .radio {
      flex: 1 1 auto;
      text-align: center;
    }

    .radio-inputs .radio input {
      display: none;
    }

    .radio-inputs .radio .name {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      border-radius: 12px;
      border: none;
      padding: 16px 8px;
      color: var(--text-muted);
      transition: all 0.2s ease-in-out;
    }

    .radio-inputs .radio .name svg {
      width: 24px;
      height: 24px;
      opacity: 0.6;
      transition: all 0.2s ease;
    }

    .radio-inputs .radio input:checked + .name {
      background-color: var(--bg-elevated);
      color: var(--accent);
      font-weight: 600;
    }

    .radio-inputs .radio input:checked + .name svg {
      opacity: 1;
    }

    .radio-inputs .radio:hover .name {
      background-color: var(--bg-elevated);
    }

    .menu-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    @media (max-width: 360px) {
      .auth-card { border-radius: 20px; }
      .brand-title { font-size: 20px; }
      .header-title { font-size: 18px; }
      .header-nickname { font-size: 12px; padding: 6px 10px; }
    }

    @media (min-width: 500px) {
      body {
        display: flex;
        justify-content: center;
        background: #000;
      }
      .app-container, .auth-section {
        max-width: 430px;
        border-left: 1px solid var(--border-color);
        border-right: 1px solid var(--border-color);
        position: relative;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="noise-overlay"></div>

  <!-- Auth Section -->
  <section class="auth-section visible" id="authSection">
    <div class="auth-container">
      <!-- Brand -->
      <div class="auth-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M12 8v4l3 3"/>
          </svg>
        </div>
        <div class="brand-title">Poker Games</div>
        <div class="brand-subtitle">Регистрация на мероприятия</div>
      </div>

      <!-- Auth Card -->
      <div class="auth-card" id="authCard">
        <div class="auth-card-header">
          <div class="tab-container">
            <input type="radio" name="authTab" id="tabLogin" class="tab tab--login" checked />
            <label class="tab_label" for="tabLogin">Вход</label>
            <input type="radio" name="authTab" id="tabRegister" class="tab tab--register" />
            <label class="tab_label" for="tabRegister">Регистрация</label>
            <div class="indicator"></div>
          </div>
        </div>
        
        <div class="auth-card-body">
          <div class="forms-wrapper">
            <!-- Login Form -->
            <form class="auth-form login-form" id="loginForm" autocomplete="on">
              <div class="input-container">
                <input type="text" class="styled_input_bar" id="loginUsername" name="username" placeholder=" " autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" />
                <label class="input-label" for="loginUsername">Никнейм</label>
              </div>
              <div class="input-container">
                <input type="password" class="styled_input_bar" id="loginPassword" name="password" placeholder=" " autocomplete="current-password" />
                <label class="input-label" for="loginPassword">Пароль</label>
              </div>
              <div class="banner warning" id="loginBanner">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span id="loginBannerText">Ошибка входа.</span>
              </div>
              <button type="submit" class="submit-btn" id="loginBtn">
                <span class="btn-text">Войти</span><div class="loader"></div>
              </button>
            </form>
            
            <!-- Register Form -->
            <form class="auth-form register-form" id="registerForm" autocomplete="on">
              <div class="input-container">
                <input type="text" class="styled_input_bar" id="regLastName" placeholder=" " />
                <label class="input-label" for="regLastName">Фамилия</label>
              </div>
              <div class="input-container">
                <input type="text" class="styled_input_bar" id="regFirstName" placeholder=" " />
                <label class="input-label" for="regFirstName">Имя</label>
              </div>
              <div class="input-container">
                <input type="text" class="styled_input_bar" id="regMiddleName" placeholder=" " />
                <label class="input-label" for="regMiddleName">Отчество</label>
              </div>
              <div class="input-container">
                <input type="tel" class="styled_input_bar" id="regPhone" placeholder=" " maxlength="18" />
                <label class="input-label" for="regPhone">Мобильный телефон</label>
              </div>
              <div class="input-container">
                <input type="email" class="styled_input_bar" id="regEmail" placeholder=" " autocomplete="email" />
                <label class="input-label" for="regEmail">Почтовый ящик</label>
              </div>
              <div class="input-container">
                <input type="text" class="styled_input_bar" id="regNickname" name="username" placeholder=" " autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" />
                <label class="input-label" for="regNickname">Никнейм (логин)</label>
              </div>
              <div class="input-container">
                <input type="password" class="styled_input_bar" id="regPassword" name="new-password" placeholder=" " autocomplete="new-password" />
                <label class="input-label" for="regPassword">Пароль</label>
              </div>
              
              <div class="banner success" id="registerBanner">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span>Регистрация завершена. Ожидайте подтверждения организатора.</span>
              </div>
              <button type="submit" class="submit-btn" id="registerBtn">
                <span class="btn-text">Зарегистрироваться</span><div class="loader"></div>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- Version Tag -->
    <div class="version-tag" id="versionTag">v 1.06</div>
  </section>

  <!-- App Container -->
  <div class="app-container" id="appContainer">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="header-title" id="pageTitle">Мероприятия</h1>
      </div>
      <div class="header-right">
        <span class="header-nickname" id="headerNickname">player</span>
        <button class="logout-btn" id="logoutBtn" title="Выйти">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </div>
    </header>

    <!-- Body -->
    <main class="app-body">
      <div class="page-container visible" id="pageContainer">
        <div class="page-placeholder" id="pageContent">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span>Страница 1</span>
        </div>
      </div>
    </main>

    <!-- Menu -->
    <nav class="app-menu">
      <div class="radio-inputs">
        <label class="radio">
          <input type="radio" name="appMenu" id="menuEvents" checked />
          <span class="name">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          </span>
        </label>
        <label class="radio">
          <input type="radio" name="appMenu" id="menuMyEvents" />
          <span class="name">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          </span>
        </label>
        <label class="radio">
          <input type="radio" name="appMenu" id="menuSupport" />
          <span class="name">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          </span>
        </label>
      </div>
    </nav>
  </div>

  <script>
    // ==========================================
    // VERSION CONTROL
    // ==========================================
    const APP_VERSION = 'v 1.06';
    
    // Check if version changed and force reload if needed
    (function checkVersion() {
      const storedVersion = localStorage.getItem('poker_app_version');
      
      if (storedVersion && storedVersion !== APP_VERSION) {
        console.log(`Version changed: ${storedVersion} -> ${APP_VERSION}. Clearing cache...`);
        localStorage.removeItem('poker_saved_nickname');
        localStorage.removeItem('poker_saved_password');
        localStorage.removeItem('poker_auto_login');
        localStorage.setItem('poker_app_version', APP_VERSION);
      } else if (!storedVersion) {
        localStorage.setItem('poker_app_version', APP_VERSION);
      }
    })();

    // ==========================================
    // CONFIGURATION & INITIALIZATION
    // ==========================================
    const SUPABASE_URL = "https://ncdwlmgwljjwpuawlssr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jZHdsbWd3bGpqd3B1YXdsc3NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NTQxNDksImV4cCI6MjA4MzAzMDE0OX0.rrIznUflWydylTnUZvOxOkeF9eMp91qNN4Bjq2gXRL8";
    
    let supabaseClient = null;
    let currentUser = null;

    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
      try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("Supabase initialized successfully");
      } catch(e) {
        console.error("Ошибка инициализации Supabase:", e);
      }
    }

    function cleanString(str) {
      if (!str) return '';
      return str.toString().normalize('NFKC').replace(/[\u200B-\u200D\uFEFF\u00A0]/g, '').trim();
    }

    // ==========================================
    // DOM ELEMENTS
    // ==========================================
    const authCard = document.getElementById('authCard');
    const authSection = document.getElementById('authSection');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const appContainer = document.getElementById('appContainer');
    const pageContainer = document.getElementById('pageContainer');
    const pageContent = document.getElementById('pageContent');
    const pageTitle = document.getElementById('pageTitle');
    const headerNickname = document.getElementById('headerNickname');

    // ==========================================
    // TAB SWITCHING
    // ==========================================
    tabLogin.addEventListener('change', () => {
      if (tabLogin.checked) {
        authCard.classList.remove('is-register');
        hideLoginBanner();
      }
    });
    
    tabRegister.addEventListener('change', () => {
      if (tabRegister.checked) {
        authCard.classList.add('is-register');
        hideRegisterBanner();
      }
    });

    // ==========================================
    // PHONE MASK
    // ==========================================
    document.getElementById('regPhone').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 0) {
        if (value[0] === '8' || value[0] === '7') value = value.substring(1);
        let formatted = '+7';
        if (value.length > 0) formatted += ' (' + value.substring(0, 3);
        if (value.length > 3) formatted += ') ' + value.substring(3, 6);
        if (value.length > 6) formatted += '-' + value.substring(6, 8);
        if (value.length > 8) formatted += '-' + value.substring(8, 10);
        e.target.value = formatted;
      }
    });

    // ==========================================
    // BANNER HELPERS
    // ==========================================
    function showLoginBanner(message, type = 'warning') {
      const banner = document.getElementById('loginBanner');
      const text = document.getElementById('loginBannerText');
      text.textContent = message;
      banner.className = 'banner visible ' + type;
    }

    function hideLoginBanner() {
      document.getElementById('loginBanner').classList.remove('visible');
    }

    function showRegisterBanner(message, type = 'success') {
      const banner = document.getElementById('registerBanner');
      const text = banner.querySelector('span');
      text.textContent = message;
      banner.className = 'banner visible ' + type;
    }

    function hideRegisterBanner() {
      document.getElementById('registerBanner').classList.remove('visible');
    }

    // ==========================================
    // LOGIN LOGIC
    // ==========================================
    async function handleLogin(e) {
      e.preventDefault();
      
      const nickname = cleanString(document.getElementById('loginUsername').value);
      const password = cleanString(document.getElementById('loginPassword').value);
      const loginBtn = document.getElementById('loginBtn');
      
      if (!nickname || !password) {
        showLoginBanner('Заполните все поля', 'warning');
        return;
      }
      
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;
      hideLoginBanner();
      
      try {
        if (!supabaseClient) {
          showLoginBanner('Ошибка: Supabase не инициализирован', 'error');
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          return;
        }

        const { data, error } = await supabaseClient
          .from('poker_users')
          .select('*')
          .eq('nickname', nickname)
          .limit(1);
        
        if (error) throw error;
        
        if (!data || data.length === 0) {
          showLoginBanner('Пользователь не найден', 'warning');
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          return;
        }
        
        const user = data[0];
        
        if (user.password !== password) {
          showLoginBanner('Неверный пароль', 'warning');
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          return;
        }
        
        if (user.status === 'created') {
          showLoginBanner('Свяжитесь с организатором для подтверждения учетной записи', 'warning');
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          return;
        }
        
        if (user.status === 'blocked') {
          showLoginBanner('Ваша учетная запись заблокирована. Свяжитесь с организатором.', 'error');
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          return;
        }
        
        if (user.status === 'confirmed') {
          currentUser = user;
          
          await supabaseClient
            .from('poker_users')
            .update({ last_login: new Date().toISOString() })
            .eq('id', user.id);
          
          localStorage.setItem('poker_saved_nickname', nickname);
          localStorage.setItem('poker_saved_password', password);
          localStorage.setItem('poker_auto_login', 'true');
          
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          showApp();
        }
        
      } catch (err) {
        console.error("Login exception:", err);
        showLoginBanner('Ошибка: ' + err.message, 'error');
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    }

    // ==========================================
    // REGISTER LOGIC
    // ==========================================
    async function handleRegister(e) {
      e.preventDefault();
      
      const lastName = cleanString(document.getElementById('regLastName').value);
      const firstName = cleanString(document.getElementById('regFirstName').value);
      const middleName = cleanString(document.getElementById('regMiddleName').value);
      const phone = cleanString(document.getElementById('regPhone').value);
      const email = cleanString(document.getElementById('regEmail').value);
      const nickname = cleanString(document.getElementById('regNickname').value);
      const password = cleanString(document.getElementById('regPassword').value);
      
      const registerBtn = document.getElementById('registerBtn');
      
      if (!lastName || !firstName || !middleName || !phone || !email || !nickname || !password) {
        showRegisterBanner('Заполните все поля', 'warning');
        return;
      }
      
      if (nickname.length < 2) {
        showRegisterBanner('Никнейм должен быть не менее 2 символов', 'warning');
        return;
      }
      
      registerBtn.classList.add('loading');
      registerBtn.disabled = true;
      hideRegisterBanner();
      
      try {
        const { data, error } = await supabaseClient
          .from('poker_users')
          .insert([{
            last_name: lastName,
            first_name: firstName,
            middle_name: middleName,
            phone: phone,
            email: email,
            nickname: nickname,
            password: password,
            status: 'created',
            created_at: new Date().toISOString()
          }])
          .select();
        
        if (error) {
          if (error.code === '23505') showRegisterBanner('Этот никнейм уже занят', 'error');
          else showRegisterBanner('Ошибка: ' + error.message, 'error');
          registerBtn.classList.remove('loading');
          registerBtn.disabled = false;
          return;
        }
        
        showRegisterBanner('Регистрация завершена. Ожидайте подтверждения.', 'success');
        registerBtn.classList.remove('loading');
        registerBtn.disabled = false;
        
        setTimeout(() => {
          registerForm.reset();
          hideRegisterBanner();
          tabLogin.checked = true;
          authCard.classList.remove('is-register');
          document.getElementById('loginUsername').value = nickname;
        }, 3000);
        
      } catch (err) {
        showRegisterBanner('Критическая ошибка: ' + err.message, 'error');
        registerBtn.classList.remove('loading');
        registerBtn.disabled = false;
      }
    }

    // ==========================================
    // APP STATE MANAGEMENT
    // ==========================================
    function showApp() {
      authSection.classList.remove('visible');
      setTimeout(() => {
        appContainer.classList.add('visible');
        updateUserUI();
        navigateToPage('events');
      }, 400);
    }

    function hideApp() {
      localStorage.removeItem('poker_saved_nickname');
      localStorage.removeItem('poker_saved_password');
      localStorage.removeItem('poker_auto_login');
      currentUser = null;
      appContainer.classList.remove('visible');
      setTimeout(() => {
        authSection.classList.add('visible');
        loginForm.reset();
        registerForm.reset();
        hideLoginBanner();
        hideRegisterBanner();
        tabLogin.checked = true;
        authCard.classList.remove('is-register');
      }, 400);
    }

    function updateUserUI() {
      if (currentUser) headerNickname.textContent = currentUser.nickname || 'player';
    }

    // ==========================================
    // NAVIGATION
    // ==========================================
    const menuEvents = document.getElementById('menuEvents');
    const menuMyEvents = document.getElementById('menuMyEvents');
    const menuSupport = document.getElementById('menuSupport');

    const pageNames = { 'events': 'Мероприятия', 'myevents': 'Мои участия', 'support': 'Тех поддержка' };

    function navigateToPage(page) {
      pageContainer.classList.remove('visible');
      setTimeout(() => {
        pageTitle.textContent = pageNames[page] || 'Страница';
        let pageNum = page === 'events' ? 1 : page === 'myevents' ? 2 : 3;
        pageContent.innerHTML = `<div class="page-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span>Страница ${pageNum}</span></div>`;
        setTimeout(() => pageContainer.classList.add('visible'), 50);
      }, 300);
    }

    menuEvents.addEventListener('change', () => { if (menuEvents.checked) navigateToPage('events'); });
    menuMyEvents.addEventListener('change', () => { if (menuMyEvents.checked) navigateToPage('myevents'); });
    menuSupport.addEventListener('change', () => { if (menuSupport.checked) navigateToPage('support'); });

    // ==========================================
    // AUTO-LOGIN CHECK
    // ==========================================
    async function checkAutoLogin() {
      const savedNickname = localStorage.getItem('poker_saved_nickname');
      const savedPassword = localStorage.getItem('poker_saved_password');
      const autoLogin = localStorage.getItem('poker_auto_login');
      
      if (autoLogin === 'true' && savedNickname && savedPassword && supabaseClient) {
        document.getElementById('loginUsername').value = savedNickname;
        document.getElementById('loginPassword').value = savedPassword;
        try {
          const { data } = await supabaseClient.from('poker_users').select('*').eq('nickname', savedNickname).limit(1);
          if (data && data.length > 0) {
            const user = data[0];
            if (user.password === savedPassword && user.status === 'confirmed') {
              currentUser = user;
              await supabaseClient.from('poker_users').update({ last_login: new Date().toISOString() }).eq('id', user.id);
              showApp();
            }
          }
        } catch (err) { console.error("Auto-login error:", err); }
      }
    }

    // ==========================================
    // EVENT LISTENERS & INIT
    // ==========================================
    loginForm.addEventListener('submit', handleLogin);
    registerForm.addEventListener('submit', handleRegister);
    document.getElementById('logoutBtn').addEventListener('click', hideApp);
    document.addEventListener('DOMContentLoaded', checkAutoLogin);
  </script>
</body>
</html>
